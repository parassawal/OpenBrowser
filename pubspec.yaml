name: openbrowser
description: A full-featured browser built with Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.3.0
  shared_preferences: ^2.3.3
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  share_plus: ^10.1.3
  http: ^1.6.0
  file_picker: ^8.1.6
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
